name: CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Pre-deploy gate: run the authenticated/write flows against a throwaway
  # Postgres seeded with the db-etl sample data — same schema + loader as prod,
  # but disposable, so we never write test data to production.
  integration-test:
    name: Integration tests (seeded sample DB)
    runs-on: ubuntu-latest
    env:
      # Throwaway values — only ever used by this job, never in production.
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: medistat
      DB_PASSWORD: medistat
      DB_NAME: medistat
      NODE_ENV: test
      PORT: '3000'
      JWT_SECRET: ci-integration-test-secret
      CI_AUTH_SECRET: ci-integration-test-secret
    steps:
      - name: Checkout API
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Reuses the ETL repo's own schema.sql + loader (tracks its default branch).
      - name: Seed a throwaway Postgres from the db-etl sample data
        run: |
          git clone --depth 1 https://github.com/Medistat-Tiberiusgh/db-etl.git etl
          cd etl
          mv sample data
          printf 'DB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\nDB_PORT=%s\n' \
            "$DB_USER" "$DB_PASSWORD" "$DB_NAME" "$DB_PORT" > .env
          docker network create edge || true
          docker compose up -d postgres
          docker compose run --rm seed

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start API and run integration tests (auth + medications)
        run: |
          node dist/main > api.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS -X POST http://localhost:3000/graphql \
                 -H 'content-type: application/json' \
                 -d '{"query":"{ __typename }"}' >/dev/null 2>&1; then
              ready=1; break
            fi
            sleep 2
          done
          if [ "${ready:-}" != 1 ]; then
            echo "::error::API failed to start"; cat api.log; exit 1
          fi
          cd tests
          bru run Auth Medications Cleanup \
            --env-var baseUrl=http://localhost:3000 \
            --env-var ciAuthSecret="$CI_AUTH_SECRET" \
            --sandbox=developer

  deploy:
    name: Deploy
    needs: [build-image, integration-test]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -f -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_TOKEN }}"

  smoke-test:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Wait for container
        run: |
          echo "Waiting 10s for container to start up..."
          sleep 10

      # Read-only checks only: confirm production is alive and serving correct
      # data. Authenticated/write flows are covered pre-deploy by integration-test.
      - name: Run read-only smoke tests against production
        working-directory: tests
        run: |
          bru run Queries \
            --env-var baseUrl=https://medistat.tiberiusgh.com \
            --sandbox=developer

  rollback:
    name: Rollback
    needs: smoke-test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rollback webhook
        run: |
          curl -f -X POST "${{ secrets.ROLLBACK_WEBHOOK_URL }}" \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_TOKEN }}"
