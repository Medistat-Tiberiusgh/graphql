name: CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -f -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_TOKEN }}"

  smoke-test:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Wait for container
        run: |
          echo "Waiting 10s for container to start up..."
          sleep 10

      - name: Run Bruno tests
        working-directory: tests
        run: |
          bru run \
            --env-var baseUrl=https://medistat.tiberiusgh.com \
            --env-var ciAuthSecret=${{ secrets.CI_AUTH_SECRET }} \
            --sandbox=developer

  rollback:
    name: Rollback
    needs: smoke-test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rollback webhook
        run: |
          curl -f -X POST "${{ secrets.ROLLBACK_WEBHOOK_URL }}" \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_TOKEN }}"
