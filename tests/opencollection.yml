opencollection: 1.0.0

info:
  name: 1dv027
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{jwtToken}}"
  variables:
    - name: username
      value: testUsername
  scripts:
    - type: before-request
      code: |-
        const vars = ["testUsername", "testPassword", "testRegionId", "testGenderId", "testAgeGroupId", "jwtToken"];

        vars.forEach(key => {
            const val = bru.getGlobalEnvVar(key);
            if (val) bru.setEnvVar(key, val);
        });
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: graphql
