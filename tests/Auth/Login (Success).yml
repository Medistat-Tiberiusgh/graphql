info:
  name: Login (Success)
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    query: |
      mutation Login($username: String!, $password: String!) {
        login(username: $username, password: $password) {
          token
          username
        }
      }
    variables: |-
      {
        "username": "{{testUsername}}",
        "password": "{{testPassword}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Login returns a token", () => {
            expect(body.errors).to.be.undefined;
            expect(body.data.login).to.have.property("token");
            expect(body.data.login.token).to.be.a("string");
        });

        test("Login returns correct username", () => {
            expect(body.data.login.username).to.include("test_");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
