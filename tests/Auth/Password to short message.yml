info:
  name: Password to short message
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    query: |
      mutation RegisterNewUser(
        $user: String!
        $pass: String!
        $reg: Int!
        $gen: Int!
        $age: Int!
      ) {
        register(
          username: $user
          password: $pass
          regionId: $reg
          genderId: $gen
          ageGroupId: $age
        ) {
          token
          username
        }
      }
    variables: |-
      {
        "user": "{{testUsername}}",
        "pass": "short",
        "reg": {{testRegionId}},
        "gen": {{testGenderId}},
        "age": {{testAgeGroupId}}
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Register with short password fails", () => {
            expect(body.errors).to.not.be.undefined;
            expect(body.errors[0].extensions.code).to.equal("BAD_USER_INPUT");
            expect(body.errors[0].message).to.include("characters");
            expect(body.data).to.be.null;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
