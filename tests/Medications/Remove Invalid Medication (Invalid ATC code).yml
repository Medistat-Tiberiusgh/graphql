info:
  name: Remove Invalid Medication (Invalid ATC code)
  type: graphql
  seq: 7

graphql:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    query: |
      mutation AddMedication($atc: String!, $notes: String) {
        addMedication(atc: $atc, notes: $notes) {
          addedAt
          notes
          drugData {
            atcCode
            name
          }
        }
      }
    variables: |-
      {
          "atc": "INVALID123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Remove non-existent medication fails", () => {
            expect(body.errors).to.not.be.undefined;
            expect(body.errors[0].extensions.code).to.equal("NOT_FOUND");
            expect(body.data).to.be.null;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
