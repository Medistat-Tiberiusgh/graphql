info:
  name: Fetch My Medication (Authenticated)
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    query: |
      query GetMe {
        me {
          medications {
            notes
            addedAt
            drugData {
              atcCode
              name
            }
          }
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const med = body.data.me.medications[0];

        test("Get my medications succeeds", () => {
            expect(body.errors).to.be.undefined;
            expect(body.data.me.medications).to.be.an("array");
        });

        test("Medication has correct structure", () => {
            expect(med).to.have.property("addedAt");
            expect(med).to.have.property("notes");
            expect(med.drugData).to.have.property("atcCode");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
