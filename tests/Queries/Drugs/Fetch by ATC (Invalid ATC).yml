info:
  name: Fetch by ATC (Invalid ATC)
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    query: |
      query GetDrug($atcCode: String!) {
        drug(atcCode: $atcCode) {
          atcCode
          name
          narcoticClass
        }
      }
    variables: |-
      {
        "atcCode": "INVALID"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Get drug with invalid ATC code fails", () => {
            expect(body.errors).to.not.be.undefined;
            expect(body.errors[0].extensions.code).to.equal("NOT_FOUND");
            expect(body.data).to.be.null;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
