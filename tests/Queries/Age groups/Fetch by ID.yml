info:
  name: Fetch by ID
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    query: |
      query GetAgeGroup($id: Int!) {
        ageGroup(id: $id) {
          id
          range
        }
      }
    variables: |-
      {
        "id": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Get age group by id succeeds", () => {
            expect(body.errors).to.be.undefined;
            expect(body.data.ageGroup).to.not.be.null;
        });

        test("Age group has correct data", () => {
            expect(body.data.ageGroup.id).to.equal(1);
            expect(body.data.ageGroup.range).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
