info:
  name: Fetch by ID
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    query: |
      query GetGender($id: Int!) {
        gender(id: $id) {
          id
          name
        }
      }
    variables: |-
      {
        "id": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Get gender by id succeeds", () => {
            expect(body.errors).to.be.undefined;
            expect(body.data.gender).to.not.be.null;
        });

        test("Gender has correct data", () => {
            expect(body.data.gender.id).to.equal(1);
            expect(body.data.gender.name).to.equal("Män");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
