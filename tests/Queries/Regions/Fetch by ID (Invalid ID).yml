info:
  name: Fetch by ID (Invalid ID)
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    query: |
      query GetRegion($regionId: Int!) {
        region(regionId: $regionId) {
          id
          regionName
        }
      }
    variables: |-
      {
        "regionId": 99999
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Get region with invalid code fails", () => {
            expect(body.errors).to.not.be.undefined;
            expect(body.errors[0].extensions.code).to.equal("NOT_FOUND");
            expect(body.data).to.be.null;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
